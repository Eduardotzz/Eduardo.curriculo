<!DOCTYPE html>  
<html lang="pt-br">  
<head>  
<meta charset="UTF-8">  
<title>Habilidades | Eduardo Henrique</title>  
<link rel="stylesheet" href="style.css">  

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  

<style>  

body.habilidades-pagina {  
    margin: 0;  
    font-family: 'Poppins', sans-serif;  
    color: white;  
    min-height: 100vh;  
    background: url('img.webp') center center/cover no-repeat;  
    position: relative;  
    overflow-x: hidden;  
}  

body.habilidades-pagina::before {  
    content: "";  
    position: fixed;  
    top: 0;  
    left: 0;  
    width: 100%;  
    height: 100%;  
    background: inherit;  
    filter: blur(25px) brightness(0.5);  
    z-index: -1;  
}  

header {  
    position: fixed;  
    width: 100%;  
    padding: 20px 80px;  
    display: flex;  
    justify-content: space-between;  
    align-items: center;  
    background: rgba(74,44,36,0.85);  
    z-index: 1000;  
}  

.logo {  
    font-weight: 700;  
    font-size: 20px;  
}  

nav a {  
    margin-left: 30px;  
    text-decoration: none;  
    color: white;  
    font-weight: 500;  
    transition: 0.3s;  
}  

nav a:hover { opacity: 0.7; }  

.skills-container {  
    padding: 140px 80px;  
    max-width: 800px;  
    margin: auto;  
    position: relative;  
    background: rgba(0,0,0,0.4);  
    border-radius: 20px;  
}  

.section-title {  
    text-align: center;  
    font-size: 32px;  
    margin-bottom: 50px;  
}  

.skill {  
    margin-bottom: 35px;  
}  

.skill-info {  
    display: flex;  
    justify-content: space-between;  
    margin-bottom: 8px;  
    font-weight: 500;  
    color: white;  
}  

.skill-info i {  
    margin-right: 10px;  
    font-size: 18px;  
}  

.fa-python { color: #3776AB; }  
.fa-java { color: #f89820; }  
.fa-html5 { color: #e34c26; }  
.fa-css3-alt { color: #264de4; }  
.fa-js { color: #f7df1e; }  
.fa-database { color: #00758f; }  

.progress {  
    width: 100%;  
    height: 24px;  
    background: rgba(255,255,255,0.2);  
    border-radius: 20px;  
    overflow: hidden;  
}  

.progress-bar {  
    height: 100%;  
    width: 0;  
    background: linear-gradient(90deg, #FFD7B5, #FFB074);  
    border-radius: 20px;  
    transition: width 1.5s ease;  
    text-align: right;  
    padding-right: 10px;  
    line-height: 24px;  
    color: #fff;  
    font-weight: 600;  
}  

@media (max-width:768px){  
    header{padding:20px;}  
    nav a{margin-left:15px;}  
    .skills-container{padding:100px 20px;}  
}  

</style>  
</head>  

<body class="habilidades-pagina">  

<header>  
    <div class="logo">Eduardo.dev</div>  
    <nav>  
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>  
        <a href="projetos.html"><i class="fa-solid fa-code"></i> Projetos</a>  
        <a href="contato.html"><i class="fa-solid fa-envelope"></i> Contato</a>  
    </nav>  
</header>  

<section class="skills-container">  
    <h2 class="section-title">Minhas Habilidades</h2>  

    <div class="skill">  
        <div class="skill-info">
            <p><i class="fa-brands fa-python"></i> Python</p>
            <p>85%</p>
        </div>  
        <div class="progress">
            <div class="progress-bar" data-progress="85%">85%</div>
        </div>  
    </div>  

    <div class="skill">  
        <div class="skill-info">
            <p><i class="fa-solid fa-database"></i> MySQL</p>
            <p>80%</p>
        </div>  
        <div class="progress">
            <div class="progress-bar" data-progress="80%">80%</div>
        </div>  
    </div>  

    <div class="skill">  
        <div class="skill-info">
            <p><i class="fa-brands fa-java"></i> Java</p>
            <p>75%</p>
        </div>  
        <div class="progress">
            <div class="progress-bar" data-progress="75%">75%</div>
        </div>  
    </div>  

    <div class="skill">  
        <div class="skill-info">
            <p><i class="fa-brands fa-html5"></i> <i class="fa-brands fa-css3-alt"></i> HTML & CSS</p>
            <p>65%</p>
        </div>  
        <div class="progress">
            <div class="progress-bar" data-progress="65%">65%</div>
        </div>  
    </div>  

    <div class="skill">  
        <div class="skill-info">
            <p><i class="fa-brands fa-js"></i> JavaScript</p>
            <p>60%</p>
        </div>  
        <div class="progress">
            <div class="progress-bar" data-progress="60%">60%</div>
        </div>  
    </div>  

</section>  

<script>  
document.addEventListener("DOMContentLoaded", () => {  
    const bars = document.querySelectorAll('.progress-bar');  
    bars.forEach(bar => {  
        const value = bar.getAttribute('data-progress');  
        setTimeout(()=>{ bar.style.width = value; }, 500);  
    });  
});  
</script>  

</body>  
</html>
